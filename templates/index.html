<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RMBG Launcher UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui.css') }}">
</head>
<body>
  <div class="bg-shape bg-a"></div>
  <div class="bg-shape bg-b"></div>

  <main class="wrap">
    <header class="top">
      <h1>RMBG Launcher UI</h1>
      <p>Run setup, optional installers, conversion, and Torch/ONNX/TRT launchers from one panel.</p>
    </header>

    <section class="grid" id="taskGrid">
      {% for task_id, t in tasks.items() %}
      <article class="card" data-task-id="{{ task_id }}">
        <h2>{{ t.label }}</h2>
        <p>{{ t.description }}</p>

        <form class="task-form">
          {% for f in t.fields %}
          <label>
            <span>{{ f.label }}</span>
            {% if f.type == 'select' %}
            <select name="{{ f.name }}">
              {% for opt in f.options %}
              <option value="{{ opt.value }}" {% if opt.value == f.default %}selected{% endif %}>{{ opt.label }}</option>
              {% endfor %}
            </select>
            {% else %}
            <input type="{{ f.type }}" name="{{ f.name }}" value="{{ f.default }}">
            {% endif %}
          </label>
          {% endfor %}

          <button type="submit">Run</button>
        </form>
      </article>
      {% endfor %}
    </section>

    <section class="jobs">
      <div class="jobs-head">
        <h2>Jobs</h2>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
      <div id="jobsList" class="jobs-list"></div>
    </section>

    <section class="logs">
      <div class="logs-head">
        <h2>Logs</h2>
        <button id="stopBtn" type="button" disabled>Stop Selected Job</button>
      </div>
      <pre id="logOutput">Select a job to view logs.</pre>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
</body>
</html>
